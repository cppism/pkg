on:
  schedule:
    - cron: '00 16 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: track
      - run: gradle run
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      - run: |
          git config user.name "GitHub Actions"
          git config user.mail "actions@github.com"
          git add --all
          git commit --allow-empty -m "$(date +'%Y-%m-%d')"
          git push